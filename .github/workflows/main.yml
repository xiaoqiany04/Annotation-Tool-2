name: Build Gradio App

on:
  workflow_dispatch: 
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Build with PyInstaller
      run: |
        # 使用 --onefile 打包，--hidden-import 确保 gradio 不缺依赖
        pyinstaller --onefile --hidden-import gradio app_new.py

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: AnnotationTool
        path: dist/app_new.exe
