name: Build Gradio App

on:
  workflow_dispatch: 
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install gradio    # 🌟 修改点：直接安装 gradio，不要 requirements.txt 了！

    - name: Build with PyInstaller
      run: |
        pyinstaller --hidden-import gradio --collect-all gradio --collect-all safehttpx --collect-all groovy --collect-all fastapi --collect-all uvicorn --collect-all starlette --collect-all pydantic --collect-all jinja2 --collect-all altair app_new.py

    - name: Upload EXE Folder
      uses: actions/upload-artifact@v4
      with:
        name: AnnotationTool-FastVersion
        path: dist/app_new
